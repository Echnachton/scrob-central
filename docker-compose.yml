services:
  mongodb:
    image: mongodb/mongodb-community-server:8.0-ubi8-slim
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"

  scrob-central:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: scrob-central
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  mongodb_data:
